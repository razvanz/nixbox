name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint all shell scripts
        run: |
          shellcheck -x -S warning \
            bin/nixbox \
            lib/functions.bash \
            plugins/*/commands/*.sh \
            plugins/*/scripts/*.sh

  unit-tests:
    name: BATS Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run unit tests
        run: bash tests/run-unit-tests.sh

  nix-eval:
    name: Nix Eval Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Run Nix config resolution tests
        run: bash tests/run-nix-tests.sh
