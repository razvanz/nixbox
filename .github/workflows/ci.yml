name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Install tools
        run: sudo apt-get install -y shellcheck bats
      - name: ShellCheck
        run: |
          shellcheck -x -S warning \
            bin/nixbox \
            lib/functions.bash \
            plugins/*/commands/*.sh \
            plugins/*/scripts/*.sh
      - name: BATS unit tests
        run: bash tests/run-unit-tests.sh
      - name: Nix eval tests
        run: bash tests/run-nix-tests.sh
