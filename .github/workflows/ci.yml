name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: ShellCheck
        run: nix shell nixpkgs#shellcheck -c shellcheck -x -S warning bin/nixbox lib/functions.bash plugins/*/commands/*.sh plugins/*/scripts/*.sh
      - name: BATS unit tests
        run: nix shell nixpkgs#bats -c bash tests/run-unit-tests.sh
      - name: Nix eval tests
        run: bash tests/run-nix-tests.sh

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Install runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y dnsmasq nftables
      - name: E2E test
        run: bash tests/run-e2e-tests.sh
